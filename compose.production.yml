services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: s26837_project
      POSTGRES_DB: s26837_project_production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s26837_project -d s26837_project_production"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.production
    restart: unless-stopped
    command: ["./bin/thrust", "./bin/rails", "server"]
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      DB_HOST: db
      S26837_PROJECT_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SOLID_QUEUE_IN_PUMA: "1"
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
    ports:
      - "80:80"
    volumes:
      - app_storage:/rails/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  app_storage:
